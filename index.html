<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>こるく監視</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== 共通スタイル ===== */
body {
   font-family: sans-serif;
   max-width: 650px;
   margin: auto;
   padding: 20px;
   background: #fef9f5;
   position: relative;
}

input {
   width: 100%;
   padding: 8px;
   margin: 5px 0;
   border-radius: 8px;
   font-size: 16px;
}

button {
   padding: 6px;
   margin: 3px;
   border: none;
   border-radius: 8px;
   background: #a0e7e5;
   font-size: 16px;
}

canvas {
   background: #fff;
   margin-top: 10px;
   border-radius: 10px;
}

li { margin-bottom: 5px; }

.hidden { display: none; }

/* 🐶ロゴ */
.logo {
   position: absolute;
   top: 10px;
   right: 15px;
   background: #d2a679;
   color: #fff;
   padding: 6px 12px;
   border-radius: 20px;
   font-weight: bold;
   box-shadow: 0 2px 5px rgba(0,0,0,0.2);
   font-size: 16px;
}

/* ===== スマホ用（画面幅600px以下） ===== */
@media screen and (max-width: 600px) {
   body {
       padding: 10px;
   }

   input, button {
       font-size: 18px;
       padding: 12px;
   }

   .logo {
       font-size: 18px;
       padding: 8px 14px;
   }

   canvas {
       width: 100% !important;
       height: auto !important;
   }

   h1 {
       font-size: 24px;
   }
}
</style>
</head>

<body>

<!-- 🐶ロゴ -->
<div class="logo">🐶 CORUKU</div>

<h1>こるく監視</h1>

<!-- ログイン -->
<div id="loginArea">
<input id="username" placeholder="ユーザー名">
<button onclick="login()">ログイン</button>
<hr>
<input id="newUser" placeholder="初回登録はこちら">
<button onclick="register()">登録</button>
</div>

<!-- アプリ -->
<div id="appArea" class="hidden">

<div>
<span id="userDisplay"></span>
<button onclick="logout()">ログアウト</button>
<button onclick="resetAll()">全リセット</button>
</div>

<button onclick="showTab('input')">入力</button>
<button onclick="showTab('graph')">グラフ</button>

<hr>

<div id="points">🐶こるくポイント：0pt</div>

<div id="inputTab">

<input type="date" id="date">
<input type="number" id="target" placeholder="目標体重">
<input type="number" id="weight" placeholder="体重">

<input type="number" id="bmi" placeholder="BMI">
<input type="number" id="bodyFat" placeholder="体脂肪率">
<input type="number" id="visceralFat" placeholder="内臓脂肪レベル">

<input type="number" id="muscle" placeholder="骨格筋率">
<input type="number" id="bodyAge" placeholder="体年齢">
<input type="number" id="bmr" placeholder="基礎代謝">

<input type="number" id="bpH" placeholder="血圧 上">
<input type="number" id="bpL" placeholder="血圧 下">
<input type="number" id="pulse" placeholder="脈拍">

<button onclick="add()">追加</button>

<div id="advice"></div>
<div id="stats"></div>

<h3>記録一覧</h3>
<ul id="recordList"></ul>

</div>

<div id="graphTab" class="hidden">

<button onclick="changeGraph('weight')">体重</button>
<button onclick="changeGraph('bp')">血圧</button>
<button onclick="changeGraph('bodyFat')">体脂肪</button>
<button onclick="changeGraph('visceralFat')">内臓脂肪</button>
<button onclick="changeGraph('muscle')">骨格筋率</button>
<button onclick="changeGraph('future')">未来予測</button>

<canvas id="chart"></canvas>

</div>

</div>

<script>
// ===== ユーザー管理 =====
let users = JSON.parse(localStorage.getItem("users") || "[]");

function login(){
const name=username.value;
if(!users.includes(name)){
alert("登録されていません");
return;
}
localStorage.setItem("user",name);
startApp();
}

function register(){
const name=newUser.value;
if(users.includes(name)){alert("存在済み");return;}
users.push(name);
localStorage.setItem("users",JSON.stringify(users));
alert("登録OK");
}

function logout(){
localStorage.removeItem("user");
location.reload();
}

function startApp(){
loginArea.classList.add("hidden");
appArea.classList.remove("hidden");
userDisplay.innerText="ユーザー："+localStorage.getItem("user");
}

if(localStorage.getItem("user")) startApp();

// ===== データ管理 =====
let records=JSON.parse(localStorage.getItem("records")||"[]");
let points=Number(localStorage.getItem("points")||0);

function save(){
localStorage.setItem("records",JSON.stringify(records));
}

// ===== ポイント計算 =====
function recalcPoints(){
points = 0;
records.forEach((r,i)=>{
points += 10; // 記録しただけでもらえる
if(i>0){
let prev=records[i-1];
if(prev.weight && r.weight){
if(r.weight<prev.weight) points+=100; // 減った
if(r.weight>prev.weight) points-=100; // 増えた＝リバウンド
}
}
if((i+1)%7===0) points+=50; // 1週間記録ボーナス
});
if(points<0) points=0;
localStorage.setItem("points", points);
updatePoints();
}

// ===== タブ切り替え =====
function showTab(t){
inputTab.classList.add("hidden");
graphTab.classList.add("hidden");
document.getElementById(t+"Tab").classList.remove("hidden");
}

// ===== 記録追加 =====
function add(){
const d={
date:date.value || new Date().toISOString().split("T")[0],
target:+target.value || null,
weight:+weight.value || null,
bmi:+bmi.value || null,
bodyFat:+bodyFat.value || null,
visceralFat:+visceralFat.value || null,
muscle:+muscle.value || null,
bodyAge:+bodyAge.value || null,
bmr:+bmr.value || null,
bpH:+bpH.value || null,
bpL:+bpL.value || null,
pulse:+pulse.value || null
};
records.push(d);
save();
recalcPoints();
analyze(d);
stats();
renderChart();
renderList();
}

// ===== ポイント表示 =====
function updatePoints(){
document.getElementById("points").innerText="🐶こるくポイント："+points+"pt";
}
updatePoints();

// ===== こるくアドバイス =====
function analyze(d){
let m="🐶こるくからアドバイス<br>";
if(d.weight && records.length>1){
let prev=records[records.length-2].weight;
if(prev){
if(d.weight<prev){m+="・体重が減少しています。とても良い流れです。<br>";}
else if(d.weight>prev){m+="・体重が増加しています。食事と運動を見直しましょう。<br>";}
}
}
if(d.weight && d.target){
let diff=d.weight-d.target;
if(diff>0){m+=`・目標まであと${diff.toFixed(1)}kgです。<br>`;}
else{m+="・目標達成しています。素晴らしいです。<br>";}
}
if(d.bodyFat && d.bodyFat>25){m+="・体脂肪率が高めです。魚や鶏肉中心の食事が効果的です。<br>";}
if(d.visceralFat && d.visceralFat>10){m+="・内臓脂肪が高めです。有酸素運動を取り入れましょう。<br>";}
if(d.muscle && d.muscle<30){m+="・骨格筋率が低めです。筋トレを取り入れると改善します。<br>";}
if(d.bpH && d.bpH>140){m+="・血圧が高めです。塩分を控えましょう。<br>";}
if(d.pulse && d.pulse>90){m+="・脈拍が高めです。しっかり休息をとりましょう。<br>";}
advice.innerHTML=m;
}

// ===== 統計 =====
function stats(){
let last7=records.slice(-7);
let avg=last7.reduce((s,r)=>s+(r.weight||0),0)/last7.length;
stats.innerHTML=`1週間平均：${avg.toFixed(1)}kg`;
}

// ===== 記録一覧 =====
function renderList(){
recordList.innerHTML="";
records.forEach((r,i)=>{
let li=document.createElement("li");
li.innerHTML=`${r.date} | ${r.weight ?? "-"}kg
<button onclick="editRecord(${i})">編集</button>
<button onclick="deleteRecord(${i})">削除</button>`;
recordList.appendChild(li);
});
}

function deleteRecord(i){
if(!confirm("削除する？")) return;
records.splice(i,1);
save();
recalcPoints();
renderList();
renderChart();
}

function editRecord(i){
let r=records[i];
date.value=r.date;
target.value=r.target;
weight.value=r.weight;
bmi.value=r.bmi;
bodyFat.value=r.bodyFat;
visceralFat.value=r.visceralFat;
muscle.value=r.muscle;
bodyAge.value=r.bodyAge;
bmr.value=r.bmr;
bpH.value=r.bpH;
bpL.value=r.bpL;
pulse.value=r.pulse;
records.splice(i,1);
save();
recalcPoints();
renderList();
renderChart();
}

// ===== 全リセット =====
function resetAll(){
if(!confirm("全データ削除しますか？")) return;
if(!confirm("本当に削除しますか？")) return;

localStorage.removeItem("records");
localStorage.removeItem("points");

records=[];
points=0;

updatePoints();
renderList();
renderChart();
}

// ===== グラフ =====
let chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:[],datasets:[]}
});

function changeGraph(t){
let labels=records.map(r=>r.date);
chart.data.labels=labels;

switch(t){
case "weight":
chart.data.datasets=[{label:"体重",data:records.map(r=>r.weight),borderColor:"#ff6384",fill:false}];
break;
case "bp":
chart.data.datasets=[
{label:"血圧 上",data:records.map(r=>r.bpH),borderColor:"#36a2eb",fill:false},
{label:"血圧 下",data:records.map(r=>r.bpL),borderColor:"#ffce56",fill:false}
];
break;
case "bodyFat":
chart.data.datasets=[{label:"体脂肪率",data:records.map(r=>r.bodyFat),borderColor:"#ff9f40",fill:false}];
break;
case "visceralFat":
chart.data.datasets=[{label:"内臓脂肪レベル",data:records.map(r=>r.visceralFat),borderColor:"#4bc0c0",fill:false}];
break;
case "muscle":
chart.data.datasets=[{label:"骨格筋率",data:records.map(r=>r.muscle),borderColor:"#c9cbcf",fill:false}];
break;
case "future":
// ここは簡易予測例として線形外挿
let futureLabels=labels.slice();
let futureData=records.map(r=>r.weight);
for(let i=1;i<=7;i++){futureLabels.push("予測+"+i); futureData.push(futureData[futureData.length-1]);}
chart.data.labels=futureLabels;
chart.data.datasets=[{label:"未来予測体重",data:futureData,borderColor:"#9966ff",fill:false}];
break;
}
chart.update();
}

function renderChart(){changeGraph("weight");}
renderChart();
renderList();

function showTab(t){
inputTab.classList.add("hidden");
graphTab.classList.add("hidden");
document.getElementById(t+"Tab").classList.remove("hidden");
}
</script>

</body>
</html>
